<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body{
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #4e73df, #1cc88a);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    h2{
        text-align: center;
        color: white;
        margin-bottom: 20px;
    }

    input{
        width: 250px;
        padding: 10px;
        border-radius: 8px;
        border: none;
        outline: none;
        font-size: 16px;
    }

    input:focus{
        box-shadow: 0 0 8px rgba(0,0,0,0.3);
    }

    #message{
        margin-top: 15px;
        font-weight: bold;
        font-size: 18px;
        text-align: center;
    }

    
</style>
</head>
<body>
    <h2>password strength checker</h2>
    <input type="password" id="password" placeholder="enter password" onkeyup="checkpassword()" >
    
    <h3 id="message"></h3>

     <script>
        function checkpassword(){
            let pwd=document.getElementById("password").value;
            let message=document.getElementById("message");
            if(pwd.length===0){
                message.innerText="";
            }
             else if(pwd.length<5)
             {message.innerHTML="weak password";
             message.style.color="red";
             }else if(pwd.length>=5 &&pwd.length<8){message.innerHTML="medium password";
             message.style.color="orange";
             }
             else{message.innerHTML="strong password";
             message.style.color="green";


             }
        }
    </script>
    
</body>
</html>
